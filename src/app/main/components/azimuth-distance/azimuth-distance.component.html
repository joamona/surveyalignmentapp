<div class="fondo">
    <br>
    <main-header></main-header>
    <br>
    <div fxLayout="row" fxLayoutAlign="space-around">
        <!--When the screen is greater than medium (gt-md) changes the width to 50%-->
        <div fxFlex.gt-md="50%">
            <form [formGroup]="controlsGroup" autocomplete="off">
                <mat-card>
                    <div fxLayout="row" fxLayoutAlign="space-around"><mat-card-title>Calcular Azimut y
                            Distancia</mat-card-title></div>
                    <mat-card-content>

                        <div fxLayout="row wrap" fxLayoutAlign="center center" fxLayoutGap="16px grid">
                            <!--PUNTO 1 -->
                            <div fxFlex.xl="45%" fxFlex.lg="45%" fxFlex.md="45%" fxFlex.sm="50%" fxFlex.xs="100%">
                                <mat-card>
                                    <div fxLayout="row" fxLayoutAlign="space-around"><mat-card-title>Pt1. Punto de
                                            Partida</mat-card-title> </div>
                                    <mat-card-content>
                                        <label class="input-label">X pt1</label>
                                        <mat-form-field class="full-width">
                                            <input onClick="this.select();" type="number" matInput placeholder="X pt1"
                                                [formControl]="xpt1" matTooltip="X pt1" (change)="clearResults()">
                                            <mat-error *ngIf="xpt1.hasError('required')">
                                                The X is mandatory.
                                            </mat-error>
                                        </mat-form-field>
                                        <label class="input-label">Y pt1</label>
                                        <mat-form-field class="full-width">
                                            <input onClick="this.select();" type="number" matInput placeholder="Y pt1"
                                                [formControl]="ypt1" matTooltip="Y pt1" (change)="clearResults()">
                                            <mat-error *ngIf="ypt1.hasError('required')">
                                                The Y is mandatory.
                                            </mat-error>
                                        </mat-form-field>
                                    </mat-card-content>
                                </mat-card>
                            </div>
                            <!--PUNTO 2 -->
                            <div fxFlex.xl="45%" fxFlex.lg="45%" fxFlex.md="45%" fxFlex.sm="50%" fxFlex.xs="100%">
                                <mat-card>
                                    <div fxLayout="row" fxLayoutAlign="space-around"><mat-card-title>Pt2. Punto
                                            Final</mat-card-title></div>
                                    <mat-card-content>
                                        <label class="input-label">X pt2</label>
                                        <mat-form-field class="full-width">
                                            <input onClick="this.select();" type="number" matInput placeholder="X pt2"
                                                [formControl]="xpt2" matTooltip="X pt2" (change)="clearResults()">
                                            <mat-error *ngIf="xpt2.hasError('required')">
                                                The X is mandatory.
                                            </mat-error>
                                        </mat-form-field>
                                        <label class="input-label">Y pt2</label>
                                        <mat-form-field class="full-width">
                                            <input onClick="this.select();" type="number" matInput placeholder="Y pt2"
                                                [formControl]="ypt2" matTooltip="Y pt2" (change)="clearResults()">
                                            <mat-error *ngIf="ypt2.hasError('required')">
                                                The Y is mandatory.
                                            </mat-error>
                                        </mat-form-field>
                                    </mat-card-content>
                                </mat-card>
                            </div>
                        </div>

                        <div fxLayout="column" fxLayoutAlign="center center">
                            <br>
                            <p *ngIf="errorMessage!=''" class="error-message">{{errorMessage}}</p>
                            <mat-card-actions>
                                <button mat-raised-button [disabled]="!controlsGroup.valid" (keyup.enter)="calculate()"
                                    (click)="calculate()" matTooltip="Calculate results">Calcular</button>
                            </mat-card-actions>
                        </div>

                        <!--Results-->
                        <br>
                        <div *ngIf="azimutResult.value!=''" class="flex-container" fxLayout="row"
                            fxLayoutAlign="space-around">
                            <mat-card class="full-width">
                                <div fxLayout="row" fxLayoutAlign="space-around">
                                    <mat-card-title>
                                        Resultados
                                    </mat-card-title>
                                </div>
                                <mat-card-content>
                                    <p class="parameter">Azimuth (centesimal): <span
                                            class="parameter-value">{{azimutResult.value}}<sup>g</sup></span></p>
                                    <p class="parameter">Distancia: <span
                                            class="parameter-value">{{distanceResult.value}}</span></p>
                                </mat-card-content>
                            </mat-card>
                        </div>
                    </mat-card-content>
                </mat-card>
            </form>
        </div>
    </div>
    <main-module-footer></main-module-footer>
</div>
